name: Dynamic Global Pricing Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

# Set the environment variable globally across the entire workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Bumped from 20 to 24 to match the new standards
        # Removed the cache: 'npm' line to stop the lock-file error warning

    - name: Install Scraper Dependencies
      run: |
        npm install axios cheerio

    - name: Execute Live Scraper Matrix
      run: node scraper.js

    - name: Commit and Push Updated Pricing Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add subscriptions.json
        git diff-index --quiet HEAD || git commit -m "Automated Sync: Live multi-region subscription pricing data update"
        git push
