name: Dynamic Global Pricing Sync

on:
  schedule:
    # Runs automatically every single day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the scraper anytime from the GitHub Actions tab

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Scraper Dependencies
      run: |
        npm install axios cheerio

    - name: Execute Live Scraper Matrix
      # This is the crucial line you are changing!
      run: node scraper.js

    - name: Commit and Push Updated Pricing Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add subscriptions.json
        # Only commit if changes were actually caught during the live scrape
        git diff-index --quiet HEAD || git commit -m "Automated Sync: Live multi-region subscription pricing data update"
        git push
